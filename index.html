<!DOCTYPE html>
<html>
  <head>
    <title>Pamplemouche Clicker - V1</title>
  </head>
  <body>
    <button id="btn"><img src="img/IMG_1234.jpeg" alt="Mon bouton clicker"></button>
    <style>
      body {
    margin: 0;
    display: flex;
    justify-content: center;   /* Centre horizontalement */
    align-items: center;       /* Centre verticalement */
    min-height: 100vh;         /* Prend 100% de la hauteur de la fenêtre */
    background-color:#FF4400; /* Optionnel : un fond sombre pour ton jeu */
}

#btn {
    background: none;
    border: none;
    cursor: pointer;
    outline: none;
    corner-radius: 10px;
}

#btn img {
    width: 150px; /* Ta taille personnalisée */
    height: auto;
    transition: transform 0.1s;
    corner-radius: 20px;
}

#btn img:active {
    transform: scale(0.9); /* Effet de clic */
}
    </style>
  </body>
</html>
